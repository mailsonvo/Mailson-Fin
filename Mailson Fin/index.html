function GerenciarBudgetsScreen({budgets, onClose, onSave}) {
  const [list,       setList]       = useState(budgets.map(b=>({...b})));
  const [editing,    setEditing]    = useState(null);
  const [showIcons,  setShowIcons]  = useState(null);
  const [showColors, setShowColors] = useState(null);
  const [newName,    setNewName]    = useState("");
  const [dragIdx,    setDragIdx]    = useState(null);
  const [overIdx,    setOverIdx]    = useState(null);

  const listRef   = useRef(null);
  const stateRef  = useRef({ dragging:false, fromIdx:null, toIdx:null });

  /* ── Pointer-based drag (works on both touch and mouse) ── */
  function startDrag(e, i) {
    e.preventDefault();
    stateRef.current = { dragging:true, fromIdx:i, toIdx:i };
    setDragIdx(i);
    setOverIdx(i);

    function onMove(ev) {
      if(!stateRef.current.dragging) return;
      const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
      if(!listRef.current) return;
      const rows = listRef.current.querySelectorAll("[data-row]");
      let found = stateRef.current.toIdx;
      rows.forEach(row => {
        const rect = row.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        const idx  = parseInt(row.getAttribute("data-row"));
        if(clientY > rect.top && clientY <= mid) found = idx;
        else if(clientY > mid && clientY <= rect.bottom) found = idx;
      });
      if(found !== stateRef.current.toIdx) {
        stateRef.current.toIdx = found;
        setOverIdx(found);
        // do live reorder preview
        setList(prev => {
          const next = [...prev];
          const [moved] = next.splice(stateRef.current.fromIdx, 1);
          next.splice(found, 0, moved);
          stateRef.current.fromIdx = found;
          return next.map((b,i) => ({...b, frequent:i<6}));
        });
      }
    }

    function onEnd() {
      stateRef.current.dragging = false;
      setDragIdx(null);
      setOverIdx(null);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup",   onEnd);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend",  onEnd);
    }

    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onEnd);
    window.addEventListener("touchmove", onMove, {passive:false});
    window.addEventListener("touchend",  onEnd);
  }

  /* ── other helpers ── */
  function addBudget() {
    if(!newName.trim()) return;
    const newB = {
      id: Date.now(),
      name: newName.trim(),
      limit: 500, spent: 0,
      color: BUDGET_COLORS[list.length % BUDGET_COLORS.length],
      icon: "dollar",
      frequent: list.length < 6,
    };
    setList(prev => [...prev, newB]);
    setNewName("");
  }

  function updateField(id, field, val) {
    setList(prev => prev.map(b => b.id===id ? {...b,[field]:val} : b));
  }

  function deleteBudget(id) {
    setList(prev => prev.filter(b=>b.id!==id).map((b,i)=>({...b,frequent:i<6})));
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:700,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"52px 22px 16px",flexShrink:0}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2} strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:19,fontWeight:700,color:"#FFFFFF"}}>Gerenciar Budgets</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2}}>
            Segure e arraste ⠿ para reordenar
          </div>
        </div>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={()=>onSave(list)}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
            stroke="#4ADE80" strokeWidth={2.5} strokeLinecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>

      {/* First 6 label */}
      <div style={{flexShrink:0,padding:"0 20px 8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,height:1,background:"rgba(74,222,128,0.3)"}}/>
          <span style={{fontSize:10,color:"rgba(74,222,128,0.6)",fontWeight:600,letterSpacing:0.5}}>
            ★ TELA INICIAL (primeiros 6)
          </span>
          <div style={{flex:1,height:1,background:"rgba(74,222,128,0.3)"}}/>
        </div>
      </div>

      {/* List */}
      <div ref={listRef} style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
        {list.map((b,i) => {
          const isEditing  = editing === b.id;
          const isDragging = dragIdx === i;
          const isFirst6   = i < 6;

          return (
            <div key={b.id}>
              {i===6 && (
                <div style={{display:"flex",alignItems:"center",gap:8,margin:"4px 0 8px"}}>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
                  <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:0.5}}>
                    OCULTOS NA TELA INICIAL
                  </span>
                  <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
                </div>
              )}

              <div
                data-row={i}
                style={{
                  background: isDragging ? "#252B38" : "#1C1C1E",
                  border:`1px solid ${isDragging
                    ? "rgba(96,165,250,0.6)"
                    : isFirst6
                      ? "rgba(74,222,128,0.12)"
                      : "rgba(255,255,255,0.06)"}`,
                  borderRadius:14, padding:"12px 12px", marginBottom:8,
                  transform: isDragging ? "scale(1.02)" : "scale(1)",
                  boxShadow: isDragging ? "0 10px 30px rgba(0,0,0,0.5)" : "none",
                  transition: isDragging ? "none" : "transform 0.2s, box-shadow 0.2s",
                  userSelect:"none", WebkitUserSelect:"none",
                  position:"relative", zIndex: isDragging ? 10 : 1,
                }}>

                <div style={{display:"flex",alignItems:"center",gap:10}}>

                  {/* ── Drag handle ── */}
                  <div
                    onMouseDown={e => startDrag(e, i)}
                    onTouchStart={e => startDrag(e, i)}
                    style={{
                      padding:"6px 4px", flexShrink:0,
                      cursor:"grab", touchAction:"none",
                      display:"flex",flexDirection:"column",alignItems:"center",
                      gap:3.5,
                    }}>
                    {[0,1,2].map(row=>(
                      <div key={row} style={{display:"flex",gap:4}}>
                        {[0,1].map(col=>(
                          <div key={col} style={{
                            width:3.5, height:3.5, borderRadius:"50%",
                            background: isDragging
                              ? "#60A5FA"
                              : "rgba(255,255,255,0.28)",
                          }}/>
                        ))}
                      </div>
                    ))}
                  </div>

                  {/* Icon button */}
                  <button style={{width:40,height:40,borderRadius:11,flexShrink:0,
                    background:`${b.color}18`,border:`1.5px solid ${b.color}44`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    cursor:"pointer"}}
                    onClick={()=>setShowIcons(showIcons===b.id?null:b.id)}>
                    <GerenciarIcon type={b.icon} size={18} color={b.color}/>
                  </button>

                  {/* Name */}
                  {isEditing ? (
                    <input autoFocus value={b.name}
                      onChange={e=>updateField(b.id,"name",e.target.value)}
                      onBlur={()=>setEditing(null)}
                      onKeyDown={e=>e.key==="Enter"&&setEditing(null)}
                      style={{flex:1,background:"rgba(255,255,255,0.08)",
                        border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,
                        padding:"6px 10px",color:"#FFFFFF",fontSize:15,
                        fontWeight:600,fontFamily:"inherit",outline:"none"}}/>
                  ) : (
                    <div style={{flex:1,cursor:"text"}}
                      onClick={()=>setEditing(b.id)}>
                      <div style={{fontSize:15,fontWeight:600,color:"#FFFFFF"}}>{b.name}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:1}}>
                        {isFirst6 ? "Visível na tela inicial" : "Oculto"}
                      </div>
                    </div>
                  )}

                  {/* Color dot */}
                  <button style={{width:22,height:22,borderRadius:"50%",
                    background:b.color,border:"2px solid rgba(255,255,255,0.2)",
                    cursor:"pointer",flexShrink:0,boxShadow:`0 0 8px ${b.color}66`}}
                    onClick={()=>setShowColors(showColors===b.id?null:b.id)}/>

                  {/* Delete */}
                  <button style={{background:"none",border:"none",cursor:"pointer",
                    padding:4,flexShrink:0}}
                    onClick={()=>deleteBudget(b.id)}>
                    <svg width={16} height={16} viewBox="0 0 24 24" fill="none"
                      stroke="rgba(248,113,113,0.6)" strokeWidth={2} strokeLinecap="round">
                      <polyline points="3 6 5 6 21 6"/>
                      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                      <path d="M10 11v6M14 11v6"/>
                      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    </svg>
                  </button>
                </div>

                {/* Icon picker */}
                {showIcons===b.id && (
                  <div style={{marginTop:10,padding:"10px",
                    background:"rgba(255,255,255,0.04)",borderRadius:10,
                    display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                    {BUDGET_ICONS.map(ic=>(
                      <button key={ic.id}
                        onClick={()=>{updateField(b.id,"icon",ic.id);setShowIcons(null);}}
                        style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                          background:b.icon===ic.id?`${b.color}22`:"rgba(255,255,255,0.05)",
                          border:`1px solid ${b.icon===ic.id?b.color:"transparent"}`,
                          borderRadius:8,padding:"7px 4px",cursor:"pointer"}}>
                        <GerenciarIcon type={ic.id} size={18}
                          color={b.icon===ic.id?b.color:"rgba(255,255,255,0.5)"}/>
                        <span style={{fontSize:7,color:"rgba(255,255,255,0.3)",
                          textAlign:"center",lineHeight:1.2}}>{ic.label}</span>
                      </button>
                    ))}
                  </div>
                )}

                {/* Color picker */}
                {showColors===b.id && (
                  <div style={{marginTop:10,padding:"10px",
                    background:"rgba(255,255,255,0.04)",borderRadius:10,
                    display:"flex",flexWrap:"wrap",gap:8}}>
                    {BUDGET_COLORS.map(clr=>(
                      <button key={clr}
                        onClick={()=>{updateField(b.id,"color",clr);setShowColors(null);}}
                        style={{width:28,height:28,borderRadius:"50%",background:clr,
                          border:`2.5px solid ${b.color===clr?"#FFFFFF":"transparent"}`,
                          cursor:"pointer",
                          boxShadow:b.color===clr?`0 0 8px ${clr}`:"none"}}/>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}

        {/* Add new */}
        <div style={{background:"rgba(255,255,255,0.03)",
          border:"1px dashed rgba(255,255,255,0.12)",
          borderRadius:14,padding:"12px 14px",marginBottom:24,
          display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,borderRadius:11,flexShrink:0,
            background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.25)",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none"
              stroke="#3B82F6" strokeWidth={2.2} strokeLinecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
          <input placeholder="Nome do novo budget…" value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addBudget()}
            style={{flex:1,background:"transparent",border:"none",outline:"none",
              fontSize:15,color:"#FFFFFF",fontFamily:"inherit"}}/>
          {newName.trim() && (
            <button style={{background:"#3B82F6",border:"none",borderRadius:8,
              padding:"6px 12px",color:"#FFFFFF",fontSize:13,fontWeight:600,
              cursor:"pointer"}}
              onClick={addBudget}>
              Criar
            </button>
          )}
        </div>
      </div>

      {/* CTA */}
      <div style={{padding:"12px 20px 44px",flexShrink:0}}>
        <button style={{width:"100%",padding:"17px 0",borderRadius:16,border:"none",
          background:"linear-gradient(135deg,#5BB8F5 0%,#2563EB 50%,#1A4FBE 100%)",
          color:"#FFFFFF",fontSize:17,fontWeight:700,cursor:"pointer",
          boxShadow:"0 4px 20px rgba(37,99,235,0.4)",letterSpacing:0.2}}
          onClick={()=>onSave(list)}>
          Salvar Organização
        </button>
      </div>
    </div>
  );
}


/* ─── BUDGETS NAV SCREEN ─────────────────────────────────────────────────── */
function BudgetsNavScreen({budgets, hidden, onClose, onOpen, onEditPadrao, onGerenciar}) {

  const totalLimit = budgets.reduce((s,b)=>s+b.limit,0);
  const totalLeft  = budgets.reduce((s,b)=>s+Math.max(0,b.limit-b.spent),0);
  const totalSpent = budgets.reduce((s,b)=>s+b.spent,0);

  return (
    <div style={{position:"fixed",inset:0,zIndex:600,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"52px 22px 16px"}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2} strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <span style={{fontSize:19,fontWeight:700,color:"#FFFFFF"}}>Meus Budgets</span>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {/* Gerenciar */}
          <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
            onClick={onGerenciar}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none"
              stroke="#3B82F6" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          {/* Editar padrão */}
          <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
            onClick={onEditPadrao}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none"
              stroke="#3B82F6" strokeWidth={2} strokeLinecap="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>
      </div>

      {/* Summary strip */}
      <div style={{margin:"0 18px 16px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",
        background:"#1C1C1E",border:"1px solid rgba(255,255,255,0.07)",
        borderRadius:14,overflow:"hidden"}}>
        {[
          {label:"Total",      val:hidden?"•••":"AED "+fmtN(totalLimit), color:"#FFFFFF"},
          {label:"Gasto",      val:hidden?"•••":"AED "+fmtN(totalSpent), color:"#F87171"},
          {label:"Disponível", val:hidden?"•••":"AED "+fmtN(totalLeft),  color:"#4ADE80"},
        ].map((item,i,arr)=>(
          <Fragment key={item.label}>
            <div style={{padding:"12px 0",textAlign:"center"}}>
              <div style={{fontSize:9.5,color:"rgba(255,255,255,0.35)",letterSpacing:0.5,
                marginBottom:4,textTransform:"uppercase"}}>{item.label}</div>
              <div style={{fontSize:13,fontWeight:700,color:item.color}}>{item.val}</div>
            </div>
            {i<arr.length-1&&<div style={{width:1,background:"rgba(255,255,255,0.07)",margin:"8px 0"}}/>}
          </Fragment>
        ))}
      </div>

      {/* Budget list — image 1 style */}
      <div style={{flex:1,overflowY:"auto",padding:"0 18px 30px"}}>
        {budgets.map(b=>{
          const avail   = b.limit - b.spent;
          const usedPct = Math.min((b.spent/b.limit)*100,100);
          const availPct= Math.max(100-usedPct,0);
          const over    = avail < 0;
          return (
            <div key={b.id} style={{
              background:"#1C1C1E",border:"1px solid rgba(255,255,255,0.06)",
              borderRadius:16,padding:"16px 16px 13px",marginBottom:10,
              cursor:"pointer",
            }} onClick={()=>onOpen(b)}>
              {/* Top: icon + name + amount + chevron */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:46,height:46,borderRadius:13,flexShrink:0,
                  background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <BIcon type={b.icon} size={22}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:17,fontWeight:700,color:"#FFFFFF",lineHeight:1.2}}>
                    {b.name}
                  </div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:2}}>
                    {hidden?"AED •••":"de AED "+fmtN(b.limit)}
                  </div>
                  <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.3,lineHeight:1.2,
                    color:over?"#F87171":"#4ADE80"}}>
                    {hidden?"AED •••":"AED "+fmtN(Math.abs(avail))}
                  </div>
                </div>
                <svg width={14} height={14} viewBox="0 0 24 24" fill="none"
                  stroke="rgba(255,255,255,0.2)" strokeWidth={2.2} strokeLinecap="round">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </div>
              {/* Bar */}
              <div style={{height:4,background:"rgba(255,255,255,0.08)",borderRadius:2,
                overflow:"hidden",marginBottom:7}}>
                <div style={{height:"100%",width:`${usedPct}%`,background:b.color,borderRadius:2,
                  boxShadow:`0 0 6px ${b.color}88`,transition:"width .4s"}}/>
              </div>
              {/* Footer */}
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,color:"#3A3A3C"}}>
                  {hidden?"AED •••":"AED "+fmtN(b.spent)}
                </span>
                <span style={{fontSize:12,fontWeight:600,
                  color:over?"#F87171":b.color}}>
                  {Math.round(availPct)}% livre
                </span>
              </div>

            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── EDITAR BUDGET PADRÃO SCREEN ────────────────────────────────────────── */
function EditarBudgetPadraoScreen({budgets, onClose, onSave}) {
  // Local limits state — copy of current limits (these are the "default" values)
  const [limits, setLimits] = useState(
    Object.fromEntries(budgets.map(b=>[b.id, b.limit]))
  );
  const [income, setIncome] = useState(
    budgets.reduce((s,b)=>s+b.limit,0).toString()
  );

  const incomeVal  = parseFloat(income) || 0;
  const totalAlloc = Object.values(limits).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const remaining  = incomeVal - totalAlloc;
  const allocPct   = incomeVal > 0 ? Math.min((totalAlloc/incomeVal)*100,100) : 0;
  const isBalanced = Math.abs(remaining) < 1;

  function handleSave() {
    if (!isBalanced) return;
    const updated = budgets.map(b=>({
      ...b,
      limit: parseFloat(limits[b.id]) || b.limit,
    }));
    onSave(updated);
  }

  const COLORS = {
    "#EF4444":"#EF4444","#38BDF8":"#38BDF8","#EAB308":"#EAB308","#D97706":"#D97706",
    "#F97316":"#F97316","#C084FC":"#C084FC","#3B82F6":"#3B82F6","#4ADE80":"#4ADE80",
    "#A78BFA":"#A78BFA","#60A5FA":"#60A5FA","#16A34A":"#16A34A",
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:700,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"52px 22px 20px"}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2} strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <span style={{fontSize:19,fontWeight:700,color:"#FFFFFF"}}>Budget Padrão</span>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={handleSave}
          style={{opacity:isBalanced?1:0.3}}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
            stroke={isBalanced?"#4ADE80":"rgba(255,255,255,0.4)"} strokeWidth={2.5} strokeLinecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"0 20px"}}>

        {/* Income field */}
        <div style={{background:"rgba(255,255,255,0.05)",
          border:"1px solid rgba(255,255,255,0.09)",
          borderRadius:14,padding:"14px 18px",marginBottom:16,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:15,fontWeight:500,color:"rgba(255,255,255,0.7)"}}>
            💰 Entradas mensais
          </span>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>AED</span>
            <input type="number" value={income}
              onChange={e=>setIncome(e.target.value)}
              style={{background:"transparent",border:"none",outline:"none",
                fontSize:17,fontWeight:700,color:"#4ADE80",textAlign:"right",
                fontFamily:"inherit",width:120}}/>
          </div>
        </div>

        {/* Allocation bar */}
        <div style={{marginBottom:16}}>
          <div style={{height:8,background:"rgba(255,255,255,0.07)",
            borderRadius:4,overflow:"hidden",marginBottom:8,
            display:"flex"}}>
            {budgets.map(b=>{
              const w = incomeVal>0 ? ((parseFloat(limits[b.id])||0)/incomeVal)*100 : 0;
              return w>0 ? (
                <div key={b.id} style={{height:"100%",width:`${w}%`,
                  background:b.color,transition:"width .3s",
                  boxShadow:`0 0 6px ${b.color}66`}}/>
              ) : null;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>
              {Math.round(allocPct)}% alocado
            </span>
            <span style={{fontSize:13,fontWeight:700,
              color:remaining<0?"#F87171":remaining===0?"#4ADE80":"rgba(255,255,255,0.6)"}}>
              {remaining>=0?"▶ ":"▼ "}
              {remaining>=0?"Restam":"Excesso"} AED {Math.abs(Math.round(remaining)).toLocaleString("en-AE")}
            </span>
          </div>
        </div>

        {/* Budget list */}
        {budgets.map(b=>{
          const val    = parseFloat(limits[b.id])||0;
          const pct    = incomeVal>0 ? ((val/incomeVal)*100).toFixed(1) : "0.0";
          const barW   = incomeVal>0 ? Math.min((val/incomeVal)*100,100) : 0;
          return (
            <div key={b.id} style={{background:"#1C1C1E",
              border:"1px solid rgba(255,255,255,0.06)",
              borderRadius:14,padding:"13px 14px",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                {/* Color dot */}
                <div style={{width:10,height:10,borderRadius:"50%",background:b.color,
                  boxShadow:`0 0 6px ${b.color}`,flexShrink:0}}/>
                {/* Name */}
                <span style={{flex:1,fontSize:15,fontWeight:600,color:"#FFFFFF"}}>
                  {b.name}
                </span>
                {/* Pct badge */}
                <span style={{fontSize:11,fontWeight:700,color:b.color,
                  background:`${b.color}18`,border:`1px solid ${b.color}33`,
                  borderRadius:8,padding:"2px 8px"}}>
                  {pct}%
                </span>
                {/* Input */}
                <div style={{display:"flex",alignItems:"center",gap:3,
                  background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:10,padding:"6px 10px",minWidth:110}}>
                  <span style={{fontSize:12,color:"rgba(255,255,255,0.35)"}}>AED</span>
                  <input type="number" value={limits[b.id]}
                    onChange={e=>setLimits(prev=>({...prev,[b.id]:e.target.value}))}
                    style={{background:"transparent",border:"none",outline:"none",
                      width:70,fontSize:14,fontWeight:700,color:"#FFFFFF",
                      textAlign:"right",fontFamily:"inherit"}}/>
                </div>
              </div>
              {/* Mini bar */}
              <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,
                overflow:"hidden"}}>
                <div style={{height:"100%",width:`${barW}%`,background:b.color,
                  borderRadius:2,boxShadow:`0 0 5px ${b.color}66`,
                  transition:"width .3s"}}/>
              </div>
            </div>
          );
        })}

        {/* Save info */}
        {!isBalanced && (
          <div style={{background:remaining<0?"rgba(248,113,113,0.08)":"rgba(59,130,246,0.08)",
            border:`1px solid ${remaining<0?"rgba(248,113,113,0.2)":"rgba(59,130,246,0.2)"}`,
            borderRadius:12,padding:"12px 16px",marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:4}}>
              {remaining<0
                ?"⚠️ Alocação excede as entradas mensais"
                :"💡 Você ainda tem AED "+Math.round(remaining).toLocaleString("en-AE")+" para alocar"}
            </div>
          </div>
        )}
        <div style={{height:20}}/>
      </div>

      {/* CTA */}
      <div style={{padding:"14px 20px 44px"}}>
        {/* Status hint above button */}
        {!isBalanced && (
          <div style={{textAlign:"center",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:600,
              color:remaining<0?"#F87171":"#FBBF24"}}>
              {remaining>0
                ? `⚠️ Faltam AED ${Math.round(remaining).toLocaleString("en-AE")} para alocar`
                : `⚠️ Excesso de AED ${Math.abs(Math.round(remaining)).toLocaleString("en-AE")} nos budgets`}
            </span>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:3}}>
              A soma dos budgets precisa ser igual às entradas
            </div>
          </div>
        )}
        {isBalanced && (
          <div style={{textAlign:"center",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:600,color:"#4ADE80"}}>
              ✅ 100% alocado — pronto para salvar!
            </span>
          </div>
        )}
        <button
          disabled={!isBalanced}
          style={{width:"100%",padding:"17px 0",borderRadius:16,border:"none",
            background:isBalanced
              ?"linear-gradient(135deg,#5BB8F5 0%,#2563EB 50%,#1A4FBE 100%)"
              :"rgba(255,255,255,0.07)",
            color:isBalanced?"#FFFFFF":"rgba(255,255,255,0.25)",
            fontSize:17,fontWeight:700,
            cursor:isBalanced?"pointer":"not-allowed",
            boxShadow:isBalanced?"0 4px 20px rgba(37,99,235,0.4)":"none",
            letterSpacing:0.2,transition:"all 0.25s"}}
          onClick={handleSave}>
          {isBalanced ? "Salvar Budget Padrão" : `Distribuir ${Math.round(allocPct)}%`}
        </button>
      </div>
    </div>
  );
}

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                     "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function getAvailableMonths() {
  const now   = new Date();
  const months = [];
  const cur   = new Date(now.getFullYear(), 0, 1);
  const end   = new Date(now.getFullYear(), now.getMonth()+2, 1);
  while (cur < end) {
    months.push({ year:cur.getFullYear(), month:cur.getMonth() });
    cur.setMonth(cur.getMonth()+1);
  }
  return months;
}

  });

    ...card,

                borderRadius:14,padding:"14px 16px",marginTop:8,
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:14,color:"rgba(255,255,255,0.5)"}}>Total do mês</span>
                <span style={{fontSize:18,fontWeight:800,color:"#F87171"}}>
                  AED {creditTxs.reduce((s,t)=>s+t.amount,0).toLocaleString("en-AE",{maximumFractionDigits:0})}
                </span>
              </div>
            )}
            {creditTxs.length===0 && (
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{fontSize:40,marginBottom:12}}>💳</div>
                <div style={{fontSize:15,color:"rgba(255,255,255,0.3)",marginBottom:6}}>
                  Sem lançamentos de crédito
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.2)"}}>
                  em {MONTH_NAMES[selectedMonth.month]} {selectedMonth.year}
                </div>
              </div>
            )}
          </>
        ) : (
          <CardDetail
            card={cards.find(c=>c.id===selectedCard)}
            filteredTxs={filteredTxs}
            totalFatura={totalFatura}
            selectedMonth={selectedMonth}
            budgets={budgets}
            pad={pad}
            onBack={()=>setSelectedCard(null)}
          />
        )}
      </div>
    </div>
  );
}

/* ─── BUDGET LEGEND ─────────────────────────────────────────────────────── */
function BudgetLegend({budgets, totalIncome}) {
  const [showMore, setShowMore] = useState(false);
  const firstSix = budgets.slice(0, 6);
  const rest      = budgets.slice(6);
  const toShow    = showMore ? budgets : firstSix;
  return (
    <div style={{marginTop:16,borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 10px"}}>
        {toShow.map(b=>{
          const spentPct=((b.spent/Math.max(totalIncome,1))*100).toFixed(1);
          return(
            <div key={b.id} style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:b.color,
                display:"inline-block",flexShrink:0,boxShadow:`0 0 5px ${b.color}`}}/>
              <span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>
                {b.name} ({spentPct}%)
              </span>
            </div>
          );
        })}
      </div>
      {rest.length > 0 && (
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>setShowMore(v=>!v)}
            style={{background:"none",border:"none",cursor:"pointer",
              display:"flex",alignItems:"center",gap:4,padding:0}}>
            <span style={{fontSize:11,fontWeight:600,color:"rgba(59,130,246,0.6)"}}>
              {showMore ? "Ver menos" : `Ver mais (${rest.length})`}
            </span>
            <svg width={10} height={10} viewBox="0 0 24 24" fill="none"
              stroke="rgba(59,130,246,0.6)" strokeWidth={2.5} strokeLinecap="round">
              <polyline points={showMore?"18 15 12 9 6 15":"6 9 12 15 18 9"}/>
            </svg>
          </button>
        </div>
      )}
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────────────── */
function App() {
  // ── localStorage helpers ──────────────────────────────────────────────────
  const LS = {
    get: (k, def) => { try { const v=localStorage.getItem('mf_'+k); return v?JSON.parse(v):def; } catch(e){ return def; } },
    set: (k, v)   => { try { localStorage.setItem('mf_'+k, JSON.stringify(v)); } catch(e){} },
  };

  const [tab,          setTab]          = useState("budgets");
  const [showSettings, setShowSettings] = useState(false);
  const [salary,       setSalary]       = useState(()=>LS.get('salary', 21298));
  const [appName,      setAppName]      = useState(()=>LS.get('appName', 'Mailson'));
  const [currency,     setCurrency]     = useState(()=>LS.get('currency', 'AED'));
  const [language,     setLanguage]     = useState(()=>LS.get('language', 'pt'));
  const [fxRates,      setFxRates]      = useState(()=>LS.get('fxRates', {AED:1,BRL:1.43,USD:0.272}));
  const [showAll,    setShowAll]    = useState(false);
  const [hideValues, setHideValues] = useState(false);
  const [dotsOpen,   setDotsOpen]   = useState(false);
  const [showTransfer, setShowTransfer] = useState(false);
  const [selectedBudget, setSelectedBudget] = useState(null);
  const [showTipoLancamento, setShowTipoLancamento] = useState(false);
  const [showVisaoGeral,    setShowVisaoGeral]    = useState(false);
  const [showSaida,         setShowSaida]         = useState(false);
  const [showEntrada,       setShowEntrada]       = useState(false);
  const [budgets,      setBudgets]      = useState(()=>LS.get('budgets', INIT_BUDGETS));
  const SAMPLE_TX = [
    {id:1, description:"Churras no Richard", amount:200,  payment:"debito",  type:"saida",
     budgetId:1, purchaseDate:"2026-03-18", billingDate:"2026-03-18", cartao:null, budgetLabel:"Lazer"},
    {id:2, description:"Pizza",    amount:1000, payment:"credito", type:"saida",
     budgetId:1, purchaseDate:"2026-03-21", billingDate:"2026-04-27", cartao:"talabat", budgetLabel:"Lazer"},
    {id:3, description:"Medico",   amount:150,  payment:"credito", type:"saida",
     budgetId:3, purchaseDate:"2026-03-21", billingDate:"2026-04-27", cartao:"talabat", budgetLabel:"Extras/Médico"},
    {id:4, description:"Carrefour",amount:1000, payment:"credito", type:"saida",
     budgetId:2, purchaseDate:"2026-03-21", billingDate:"2026-04-27", cartao:"fab",     budgetLabel:"Mercado"},
    {id:5, description:"Carro",    amount:25000,payment:"dinheiro",type:"saida",
     budgetId:4, purchaseDate:"2026-03-26", billingDate:"2026-03-26", cartao:null,      budgetLabel:"Combustível"},
  ];
  const [transactions, setTransactions] = useState(()=>LS.get('transactions', SAMPLE_TX));
  const [cards,        setCards]        = useState(()=>LS.get('cards', INIT_CARDS));
  const [showFaturas,    setShowFaturas]    = useState(false);
  const [showEditPadrao,  setShowEditPadrao]  = useState(false);
  const [showGerenciar,   setShowGerenciar]   = useState(false);
  const [showBudgetsNav, setShowBudgetsNav] = useState(false);

  const frequent = budgets.filter(b=>b.frequent);
  const hidden   = budgets.filter(b=>!b.frequent);

  // Saldo disponível = soma de todos os saldos restantes de cada budget
  const totalLeft  = budgets.reduce((s,b) => s + Math.max(0, b.limit - b.spent), 0);
  const totalIncome= budgets.reduce((s,b) => s + b.limit, 0);
  const totalSpent = budgets.reduce((s,b) => s + b.spent, 0);
  const leftPct    = totalIncome > 0 ? Math.round((totalLeft / totalIncome) * 100) : 0;

  // ── Auto-save to localStorage on every state change ────────────────────
  useEffect(()=>{ LS.set('budgets',     budgets);     }, [budgets]);
  useEffect(()=>{ LS.set('transactions',transactions); }, [transactions]);
  useEffect(()=>{ LS.set('cards',       cards);       }, [cards]);
  useEffect(()=>{ LS.set('salary',      salary);      }, [salary]);
  useEffect(()=>{ LS.set('appName',     appName);     }, [appName]);
  useEffect(()=>{ LS.set('currency',    currency);    }, [currency]);
  useEffect(()=>{ LS.set('language',    language);    }, [language]);
  useEffect(()=>{ LS.set('fxRates',     fxRates);     }, [fxRates]);

  function handleTransfer(fromId, toId, amt){
    setBudgets(prev=>prev.map(b=>{
      if(b.id===fromId) return {...b, limit: Math.max(0, b.limit - amt)};
      if(b.id===toId)   return {...b, limit: b.limit + amt};
      return b;
    }));
  }

  return (
    <div style={{background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      minHeight:"100vh",color:"#FFFFFF",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430,margin:"0 auto",overflowX:"hidden",position:"relative"}}>

      {/* Tipo Lançamento chooser */}
      {showSettings && (
        <SettingsScreen
          salary={salary}        onSalaryChange={setSalary}
          appName={appName}      onAppNameChange={setAppName}
          currency={currency}    onCurrencyChange={setCurrency}
          language={language}    onLanguageChange={setLanguage}
          fxRates={fxRates}      onFxRatesChange={setFxRates}
          onClose={()=>setShowSettings(false)}
        />
      )}
      {showVisaoGeral && (
        <VisaoGeralScreen
          transactions={transactions}
          budgets={budgets}
          cards={cards}
          monthlyIncome={salary}
          currency={currency}
          fxRates={fxRates}
          language={language}
          onClose={()=>setShowVisaoGeral(false)}
          onAddLancamento={()=>{setShowVisaoGeral(false);setShowTipoLancamento(true);}}
        />
      )}
      {showTipoLancamento && (
        <TipoLancamentoScreen
          onClose={()=>setShowTipoLancamento(false)}
          onSaida={()=>{setShowTipoLancamento(false);setShowSaida(true);}}
          onEntrada={()=>{setShowTipoLancamento(false);setShowEntrada(true);}}
        />
      )}
      {/* Saída screen */}
      {showSaida && (
        <LancamentoScreen budgets={budgets} cards={cards} onClose={()=>setShowSaida(false)}
          onSave={(tx)=>{
            const savedTx = {
              ...tx,
              budgetLabel: budgets.find(b=>b.id===tx.budgetId)?.name || null,
            };
            setTransactions(prev=>[...prev, savedTx]);
            if(tx.payment!=="credito"){
              setBudgets(prev=>prev.map(b=>
                b.id===tx.budgetId ? {...b, spent: b.spent+tx.amount} : b
              ));
            }
            setShowSaida(false);
          }}/>
      )}
      {/* Entrada screen */}
      {showEntrada && (
        <EntradaScreen budgets={budgets} onClose={()=>setShowEntrada(false)}
          onSave={()=>setShowEntrada(false)}/>
      )}

      {/* Budget Detail overlay */}
      {selectedBudget && (
        <BudgetDetail b={selectedBudget} hidden={hideValues}
          transactions={transactions} cards={cards}
          onClose={()=>setSelectedBudget(null)}/>
      )}

      {showGerenciar && (
        <GerenciarBudgetsScreen
          budgets={budgets}
          onClose={()=>setShowGerenciar(false)}
          onSave={(updated)=>{ setBudgets(updated); setShowGerenciar(false); }}
        />
      )}
      {showEditPadrao && (
        <EditarBudgetPadraoScreen
          budgets={budgets}
          onClose={()=>setShowEditPadrao(false)}
          onSave={(updated)=>{ setBudgets(updated); setShowEditPadrao(false); }}
        />
      )}
      {/* Budgets nav screen */}
      {showBudgetsNav && (
        <BudgetsNavScreen
          budgets={budgets}
          hidden={hideValues}
          onClose={()=>setShowBudgetsNav(false)}
          onOpen={(b)=>{ setShowBudgetsNav(false); setSelectedBudget(b); }}
          onEditPadrao={()=>{ setShowBudgetsNav(false); setShowEditPadrao(true); }}
          onGerenciar={()=>{ setShowBudgetsNav(false); setShowGerenciar(true); }}
        />
      )}
      {/* Faturas screen */}
      {showFaturas && (
        <FaturaScreen transactions={transactions} budgets={budgets} cards={cards} onSaveCards={setCards} onClose={()=>setShowFaturas(false)}/>
      )}

      {/* Transfer screen overlay */}
      {showTransfer && (
        <TransferScreen budgets={budgets} onClose={()=>setShowTransfer(false)}
          onTransfer={handleTransfer}/>
      )}

      <div style={{overflowY:"auto",paddingBottom:"calc(88px + env(safe-area-inset-bottom))"}}>

        {/* ── HEADER ── */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"56px 20px 18px",position:"relative"}}>
          <Logo appName={appName} onAppNameChange={setAppName}/>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            {/* Eye — toggle hide values */}
            <button style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}}
              onClick={()=>setHideValues(v=>!v)}>
              {hideValues ? (
                <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
                  stroke="rgba(255,255,255,0.7)" strokeWidth={1.8} strokeLinecap="round">
                  <line x1="1" y1="1" x2="23" y2="23"/>
                  <path d="M10.73 10.73A3 3 0 0 0 12 17a3 3 0 0 0 2.27-6.27"/>
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                </svg>
              ) : (
                <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
                  stroke="rgba(255,255,255,0.45)" strokeWidth={1.8} strokeLinecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              )}
            </button>
            {/* Three dots — dropdown menu */}
            <div style={{position:"relative"}}>
              <button style={{background:"none",border:"none",cursor:"pointer",padding:0,
                display:"flex",alignItems:"center"}}
                onClick={()=>setDotsOpen(v=>!v)}>
                <svg width={5} height={20} viewBox="0 0 5 20" fill="rgba(255,255,255,0.45)">
                  <circle cx="2.5" cy="2.5" r="2.5"/>
                  <circle cx="2.5" cy="10" r="2.5"/>
                  <circle cx="2.5" cy="17.5" r="2.5"/>
                </svg>
              </button>
              <DotsMenu open={dotsOpen} onClose={()=>setDotsOpen(false)}/>
            </div>
          </div>
        </div>

        {/* ── SALDO PILL ── */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:40,margin:"0 20px 16px",padding:"11px 18px",cursor:"pointer"}}>
          <span style={{fontSize:14,color:"rgba(255,255,255,0.55)"}}>
            {"Disponível"}{" "}
            <strong style={{color:"#4ADE80",fontWeight:700}}>
              {hideValues ? "AED •••" : "AED "+fmtN(totalLeft)}
            </strong>
            {" "}<span style={{color:"rgba(255,255,255,0.4)",fontWeight:500}}>• {leftPct}%</span>
          </span>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.4)" strokeWidth={2.5} strokeLinecap="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>

        {/* ── SUMMARY CARD ── */}
        <div style={{background:"#1C1C1E",border:"1px solid rgba(255,255,255,0.07)",
          borderRadius:18,margin:"0 20px 12px",padding:"18px 18px 10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1,paddingRight:10}}>
              <p style={{margin:"0 0 4px",fontSize:14,color:"rgba(255,255,255,0.45)",fontWeight:400}}>
                {"Saldo Disponível"}
              </p>
              <p style={{margin:"0 0 10px",fontSize:28,fontWeight:800,color:"#4ADE80",letterSpacing:-0.5}}>
                {hideValues ? "AED •••••" : "AED "+fmtN(totalLeft)}
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                <p style={{margin:0,fontSize:13}}>
                  <span style={{color:"rgba(255,255,255,0.4)"}}>{"Limite total"} </span>
                  <strong style={{color:"#FFFFFF",fontWeight:700}}>
                    {hideValues ? "AED •••••" : "AED "+fmtN(totalIncome)}
                  </strong>
                </p>
                <p style={{margin:0,fontSize:13}}>
                  <span style={{color:"rgba(255,255,255,0.4)"}}>{"Gasto total"} </span>
                  <strong style={{color:"#F87171",fontWeight:700}}>
                    {hideValues ? "AED •••" : "AED "+fmtN(totalSpent)}
                  </strong>
                </p>
                <p style={{margin:"2px 0 0",fontSize:15,color:"#4ADE80",fontWeight:800}}>
                  ({leftPct}% {"disponível"})
                </p>
              </div>
            </div>
            <GlowDonut budgets={budgets} size={154} stroke={18}/>
          </div>

          {/* legend */}
          <BudgetLegend budgets={[...frequent,...hidden]} totalIncome={totalIncome}/>

          {/* Divider */}
          <div style={{height:1,background:"rgba(255,255,255,0.07)",margin:"14px 0 0"}}/>

          {/* Footer actions row */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",paddingTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}
              onClick={()=>setShowTransfer(true)}>
              <span style={{fontSize:13,fontWeight:600,color:"#3B82F6"}}>"Editar Budget do Mês"</span>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="none"
                stroke="#3B82F6" strokeWidth={2.5} strokeLinecap="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          </div>
        </div>

        {/* ── BUDGET ROWS — always show all ── */}
        <div style={{padding:"0 20px"}}>
          {frequent.map(b=><BRow key={b.id} b={b} hidden={hideValues} onOpen={()=>setSelectedBudget(b)}/>)}

          {/* Ver Mais button — visible below the 6 frequent */}
          {hidden.length > 0 && (
            <button style={{
              width:"100%", padding:"13px 0",
              background:"rgba(255,255,255,0.04)",
              border:"1px solid rgba(255,255,255,0.09)",
              borderRadius:14, marginBottom:8,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              cursor:"pointer",
            }} onClick={()=>setShowAll(v=>!v)}>
              <span style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.45)"}}>
                {showAll ? "Ver menos" : `Ver mais (${hidden.length} budgets)`}
              </span>
              <svg width={14} height={14} viewBox="0 0 24 24" fill="none"
                stroke="rgba(255,255,255,0.35)" strokeWidth={2.5} strokeLinecap="round">
                {showAll
                  ? <polyline points="18 15 12 9 6 15"/>
                  : <polyline points="6 9 12 15 18 9"/>}
              </svg>
            </button>
          )}

          {/* Hidden budgets */}
          {showAll && hidden.map(b=><BRow key={b.id} b={b} hidden={hideValues} onOpen={()=>setSelectedBudget(b)}/>)}
        </div>

      </div>

      {/* ── BOTTOM NAV ── */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",maxWidth:430,
        background:"rgba(14,14,16,0.98)",backdropFilter:"blur(20px)",
        WebkitBackdropFilter:"blur(20px)",
        borderTop:"1px solid rgba(255,255,255,0.08)",
        display:"flex",justifyContent:"space-around",
        paddingTop:10,paddingBottom:"calc(16px + env(safe-area-inset-bottom))",
        zIndex:100}}>
        {[
          {id:"settings", label:"Setting",      node:<NavIco type="gear"/>},
          {id:"calendar", label:"Lançamentos", node:<NavIco type="cal"/>},
          {id:"budgets",  label:"Budgets",    special:true},
          {id:"faturas",  label:"Faturas",  node:<NavIco type="card"/>},
          {id:"budgets-nav", label:"Budgets",  node:<NavIco type="grid"/>},
        ].map(t=>{
          const on=tab===t.id;
          if(t.special) return(
            <button key={t.id} style={{background:"none",border:"none",cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",gap:4}}
              onClick={()=>setShowTipoLancamento(true)}>
              <div style={{width:46,height:40,borderRadius:14,
                background:on?"linear-gradient(135deg,#5BB8F5,#2563EB,#1A4FBE)":"rgba(255,255,255,0.1)",
                border:on?"none":"1px solid rgba(255,255,255,0.12)",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
                  stroke={on?"#fff":"rgba(255,255,255,0.5)"}
                  strokeWidth={2.2} strokeLinecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </div>
              <span style={{fontSize:10,fontWeight:600,color:on?"#60A5FA":"rgba(255,255,255,0.3)"}}>
                {t.label}
              </span>
            </button>
          );
          return(
            <button key={t.id} style={{background:"none",border:"none",cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",gap:4}}
              onClick={()=>{
                if(t.id==="settings") setShowSettings(true);
                else if(t.id==="calendar") setShowVisaoGeral(true);
                else if(t.id==="faturas") setShowFaturas(true);
                else if(t.id==="budgets-nav") setShowBudgetsNav(true);
                else setTab(t.id);
              }}>
              <div style={{width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {cloneElement(t.node,{active:on})}
              </div>
              <span style={{fontSize:10,fontWeight:500,color:on?"#60A5FA":"rgba(255,255,255,0.3)"}}>
                {t.label}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
