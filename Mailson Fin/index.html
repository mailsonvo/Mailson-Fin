/* ─── GLOW DONUT ─────────────────────────────────────────────────────────── */
function lightenHex(hex,amt=60){
  const num=parseInt(hex.slice(1),16);
  const r=Math.min(255,((num>>16)&255)+amt);
  const g=Math.min(255,((num>>8)&255)+amt);
  const b=Math.min(255,(num&255)+amt);
  return "#"+[r,g,b].map(x=>x.toString(16).padStart(2,"0")).join("");
}
function GlowDonut({budgets,size=154,stroke=18}){
  const r=((size-stroke)/2),circ=2*Math.PI*r;
  // Use totalIncome as the full circle (100%)
  // Each budget's arc = its spent amount as % of totalIncome
  const totalIncome = budgets.reduce((s,b)=>s+b.limit,0) || 1;
  // Only show budgets with spending > 0
  const active = budgets.filter(b=>b.spent>0);
  const totalSpentAll = active.reduce((s,b)=>s+b.spent,0);
  // Remaining (unspent) arc shown as dim track
  let offset=0;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",overflow:"visible",flexShrink:0}}>
      <defs>
        {budgets.map(b=>(
          <Fragment key={b.id}>
            <linearGradient id={`gr${b.id}`} x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stopColor={lightenHex(b.color,55)}/>
              <stop offset="100%" stopColor={b.color}/>
            </linearGradient>
            <filter id={`gf${b.id}`} x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </Fragment>
        ))}
      </defs>
      {/* Full dim track = 100% of income */}
      <circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke="rgba(255,255,255,0.05)" strokeWidth={stroke}/>
      {/* Each arc = spent/totalIncome * circumference */}
      {active.map(b=>{
        const dash=(b.spent/totalIncome)*circ;
        const el=<circle key={b.id} cx={size/2} cy={size/2} r={r} fill="none"
          stroke={`url(#gr${b.id})`} strokeWidth={stroke}
          strokeDasharray={`${Math.max(dash-2.5,0)} ${circ}`}
          strokeDashoffset={-offset} strokeLinecap="butt"
          filter={`url(#gf${b.id})`} style={{opacity:0.96}}/>;
        offset+=dash; return el;
      })}
    </svg>
  );
}

            stroke={canSubmit?"#3B82F6":"rgba(59,130,246,0.3)"} strokeWidth={2.5} strokeLinecap="round">

/* ─── HELPERS: period logic (12th → 11th) ───────────────────────────────── */
function getCurrentPeriod() {
  const now = new Date();
  const d = now.getDate();
  let periodStart, periodEnd;
  if (d >= 12) {
    periodStart = new Date(now.getFullYear(), now.getMonth(), 12);
    periodEnd   = new Date(now.getFullYear(), now.getMonth()+1, 11);
  } else {
    periodStart = new Date(now.getFullYear(), now.getMonth()-1, 12);
    periodEnd   = new Date(now.getFullYear(), now.getMonth(), 11);
  }
  return { periodStart, periodEnd, today: now };
}

function getWeekendDaysLeft() {
  const { periodEnd, today } = getCurrentPeriod();
  let count = 0;
  const cur = new Date(today);
  cur.setHours(0,0,0,0);
  const end = new Date(periodEnd);
  end.setHours(0,0,0,0);
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow === 0 || dow === 6) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}

function getDaysLeft() {
  const { periodEnd, today } = getCurrentPeriod();
  const ms = periodEnd - today;
  return Math.max(0, Math.ceil(ms / (1000*60*60*24)));
}

function getPeriodLabel() {
  const { periodStart, periodEnd } = getCurrentPeriod();
  const fmt = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  return `${fmt(periodStart)} – ${fmt(periodEnd)}`;
}

function getDailySpending(budget) {
  /* Generate mock daily spending spread across the current period */
  const { periodStart, periodEnd } = getCurrentPeriod();
  const days = [];
  const cur = new Date(periodStart);
  cur.setHours(0,0,0,0);
  const end = new Date(periodEnd);
  end.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  while (cur <= end && cur <= today) {
    days.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  if (days.length === 0) return [];
  // distribute spent amount across days with some randomness seeded by budget id
  let remaining = budget.spent;
  const result = days.map((date,i) => {
    const seed = (budget.id * 17 + i * 13) % 100;
    const share = i === days.length-1
      ? remaining
      : Math.round(Math.min(remaining, (budget.spent / days.length) * (0.4 + (seed/100)*1.2)));
    remaining = Math.max(0, remaining - share);
    return { date, amount: share };
  });
  return result;
}

/* ─── RING CIRCLE ───────────────────────────────────────────────────────── */
function RingCircle({pct, color, size=138, stroke=13, children}) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = Math.min(Math.max(pct,0),100) / 100 * circ;
  const uid  = `rc_${color.replace('#','')}`;
  return (
    <div style={{position:"relative", width:size, height:size}}>
      <svg width={size} height={size}
        style={{transform:"rotate(-90deg)", overflow:"visible", position:"absolute", inset:0}}>
        <defs>
          <linearGradient id={`rg_${uid}`} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stopColor={lightenHex(color,60)}/>
            <stop offset="100%" stopColor={color}/>
          </linearGradient>
          <filter id={`rf_${uid}`} x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* track */}
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
        {/* glow */}
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={color} strokeWidth={stroke+8}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{opacity:0.18, filter:"blur(6px)"}}/>
        {/* arc */}
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={`url(#rg_${uid})`} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          filter={`url(#rf_${uid})`} style={{opacity:0.97}}/>
      </svg>
      {/* center */}
      <div style={{position:"absolute", inset:0, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center"}}>
        {children}
      </div>
    </div>
  );
}

/* ─── DAILY BAR CHART ───────────────────────────────────────────────────── */
function DailyChart({budget, color}) {
  const [selectedDay, setSelectedDay] = useState(null);
  const data = getDailySpending(budget);
  if (data.length === 0) return (
    <div style={{textAlign:"center",padding:"24px 0",color:"rgba(255,255,255,0.25)",fontSize:13}}>
      Sem gastos ainda
    </div>
  );
  const maxAmt = Math.max(...data.map(d=>d.amount), 1);
  const chartH = 90;
  const pad = (n)=>String(n).padStart(2,"0");

  const infoDay = selectedDay !== null ? data[selectedDay] : null;

  return (
    <div>
      {/* Day info panel — shows when a bar is clicked */}
      <div style={{minHeight:36, marginBottom:10, display:"flex",
        alignItems:"center", justifyContent:"center"}}>
        {infoDay ? (
          <div style={{display:"flex",alignItems:"center",gap:10,
            background:`${color}18`,border:`1px solid ${color}33`,
            borderRadius:10,padding:"6px 16px"}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>
              {pad(infoDay.date.getDate())}/{pad(infoDay.date.getMonth()+1)}
            </span>
            <span style={{fontSize:18,fontWeight:800,color:color}}>
              AED {infoDay.amount.toLocaleString("en-AE",{maximumFractionDigits:0})}
            </span>
            <button style={{background:"none",border:"none",cursor:"pointer",
              color:"rgba(255,255,255,0.3)",fontSize:14,padding:0,lineHeight:1}}
              onClick={()=>setSelectedDay(null)}>✕</button>
          </div>
        ) : (
          <span style={{fontSize:11,color:"rgba(255,255,255,0.2)"}}>
            Toque em uma barra para ver o valor
          </span>
        )}
      </div>
      <div style={{overflowX:"auto", paddingBottom:4}}>
        <div style={{display:"flex", alignItems:"flex-end", gap:3,
          minWidth: data.length * 22, height: chartH + 24}}>
          {data.map((d,i) => {
            const h = Math.max((d.amount / maxAmt) * chartH, d.amount>0?4:0);
            const isToday   = d.date.toDateString() === new Date().toDateString();
            const isSelected = selectedDay === i;
            const dow = d.date.getDay();
            const isWeekend = dow===0||dow===6;
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",
                gap:3, flex:"0 0 18px", cursor:"pointer"}}
                onClick={()=>setSelectedDay(isSelected ? null : i)}>
                <div style={{width:10, height:h, borderRadius:3,
                  background: isSelected
                    ? `linear-gradient(180deg,${lightenHex(color,70)},${color})`
                    : isToday
                      ? `linear-gradient(180deg,${lightenHex(color,50)},${color})`
                      : isWeekend
                        ? `${color}66`
                        : `${color}99`,
                  boxShadow: isSelected ? `0 0 12px ${color}` : isToday ? `0 0 8px ${color}88` : "none",
                  transform: isSelected ? "scaleY(1.08)" : "scaleY(1)",
                  transition:"all .2s ease",
                  transformOrigin:"bottom"
                }}/>
                <span style={{fontSize:7,
                  color: isSelected ? color : isToday
                    ? color
                    : isWeekend
                      ? "rgba(255,255,255,0.4)"
                      : "rgba(255,255,255,0.2)",
                  fontWeight: isSelected||isToday ? 700 : 400,
                  transform:"rotate(-35deg)", transformOrigin:"top center",
                  display:"block", whiteSpace:"nowrap"}}>
                  {d.date.getDate()}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── SETTINGS SCREEN ────────────────────────────────────────────────────── */
function SettingsScreen({salary, onSalaryChange, appName, onAppNameChange, currency, onCurrencyChange,
                         language, onLanguageChange, fxRates, onFxRatesChange, onClose}) {
  const [salaryInput, setSalaryInput] = useState(salary.toString());
  const [rates,       setRates]       = useState(fxRates);
  const [loading,     setLoading]     = useState(false);
  const [rateError,   setRateError]   = useState(false);
  const t = T[language] || T.pt;

  // Fetch live exchange rates when screen opens
  useEffect(() => {
    setLoading(true);
    fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:300,
        messages:[{role:"user",content:
          "Give me today's exchange rates for 1 AED to BRL and 1 AED to USD. " +
          "Respond ONLY with valid JSON, no markdown, no explanation: " +
          "{AED:1,BRL:X.XX,USD:X.XXX}"
        }]
      })
    })
    .then(r=>r.json())
    .then(data=>{
      const text=data.content?.[0]?.text||"";
      const clean=text.replace(/^\s*```[\s\S]*?```\s*$/gm,"").trim();
      const parsed=JSON.parse(clean);
      setRates(parsed);
      onFxRatesChange(parsed);
      setLoading(false);
    })

              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>

        {/* ── CURRENCY ── */}

        {/* Exchange rate indicator */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",

              📊 1 AED = {rates.BRL?.toFixed(3)} BRL · {rates.USD?.toFixed(4)} USD
              <span style={{color:"rgba(255,255,255,0.2)",marginLeft:6}}>· ao vivo</span>

        {/* ── ABOUT ── */}

/* ─── VISÃO GERAL SCREEN ─────────────────────────────────────────────────── */
function VisaoGeralScreen({transactions, budgets, cards, monthlyIncome, onClose, onAddLancamento, onEditTransaction, onDeleteTransaction}) {
  const today = new Date();
  const pad   = (n) => String(n).padStart(2,"0");
  const [selectedMonth, setSelectedMonth] = useState({month:today.getMonth(), year:today.getFullYear()});
  const [showMonthPicker, setShowMonthPicker] = useState(false);
  const [showFilters, setShowFilters] = useState(false);
  const [filterPayment, setFilterPayment] = useState(null);
  const [filterBudget, setFilterBudget] = useState(null);
  const [editTx, setEditTx] = useState(null);
  const [editScope, setEditScope] = useState(null); // 'one' or 'forward'
  const longPressTimer = useRef(null);

  function handleTxLongPress(tx) {
    longPressTimer.current = setTimeout(()=>{
      if(tx.recorrente) {
        setEditScope('ask');
      } else {
        setEditScope('one');
      }
      setEditTx(tx);
    }, 500);
  }
  function handleTxPressEnd() {
    clearTimeout(longPressTimer.current);
  }

  function fmtDate(d) {
    const days=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
    const mn  =["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                 "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const now=new Date(); now.setHours(0,0,0,0);
    const dt =new Date(d); dt.setHours(0,0,0,0);
    const diff=Math.round((now-dt)/(1000*60*60*24));
    if(diff===0) return "Hoje · "+pad(d.getDate())+" "+mn[d.getMonth()];
    if(diff===1) return "Ontem · "+pad(d.getDate())+" "+mn[d.getMonth()];
    return days[d.getDay()]+" "+pad(d.getDate())+" "+mn[d.getMonth()];
  }
  function fmtM(n) {
    return "AED "+Math.abs(n).toLocaleString("en-AE",{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  const mn = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
               "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  /* ──────────────────────────────────────────────────────────────────────────
     BALANCE LOGIC:
     - Start: monthlyIncome (e.g. 21,298)
     - Each DEBIT/CASH saída: subtract on purchaseDate
     - Each ENTRADA: add on purchaseDate (green)
     - CREDIT purchases: do NOT subtract from balance on purchase date
       They only appear as info (greyed). On day 27 (billing date) the
       consolidated card payment subtracts.
     - Running balance = monthlyIncome + entradas − (debits + billing payments)
  ────────────────────────────────────────────────────────────────────────── */

  // Separate entrada vs saída
  const entradas = transactions.filter(t=>t.type==="entrada");
  const saidas   = transactions.filter(t=>t.type!=="entrada");

  // Group all transactions by date key for display
  // Credit purchases → show on purchaseDate (greyed, not counted)
  // Debit/cash + entradas → show on purchaseDate, counted
  // Credit billing → show on billingDate as consolidated card row, counted
  const txsByDay   = {};  // purchaseDate → [tx]  (for display)
  const entByDay   = {};  // purchaseDate → [tx]  (entradas, green)
  const billByDay  = {};  // billingDate  → {cardId→[tx]}

  saidas.forEach(tx=>{
    const k=tx.purchaseDate;
    if(!txsByDay[k]) txsByDay[k]=[];
    txsByDay[k].push(tx);
    if(tx.payment==="credito") {
      const bk=tx.billingDate||tx.purchaseDate;
      if(!billByDay[bk]) billByDay[bk]={};
      const cid=tx.cartao||"unknown";
      if(!billByDay[bk][cid]) billByDay[bk][cid]=[];
      billByDay[bk][cid].push(tx);
    }
  });
  entradas.forEach(tx=>{
    const k=tx.purchaseDate||tx.date;
    if(!entByDay[k]) entByDay[k]=[];
    entByDay[k].push(tx);
  });

  // Filter transactions by selected month
  function inSelectedMonth(dateStr) {
    if(!dateStr) return false;
    const d = new Date(dateStr+"T00:00:00");
    return d.getMonth()===selectedMonth.month && d.getFullYear()===selectedMonth.year;
  }

  // All unique dates filtered by selected month
  const allDates=new Set([
    ...Object.keys(txsByDay).filter(inSelectedMonth),
    ...Object.keys(entByDay).filter(inSelectedMonth),
    ...Object.keys(billByDay).filter(inSelectedMonth),
  ]);
  const sortedDates=[...allDates].sort((a,b)=>new Date(a)-new Date(b));

  // Build running balance per day (starts from monthlyIncome)
  const balanceMap={};  // dateKey → balance AFTER that day
  let balance=monthlyIncome||21298;
  sortedDates.forEach(dk=>{
    // Add entradas
    (entByDay[dk]||[]).forEach(t=>{ balance+=t.amount; });
    // Subtract debit/cash saidas
    (txsByDay[dk]||[]).filter(t=>t.payment!=="credito").forEach(t=>{ balance-=t.amount; });
    // Subtract credit billing on billing date
    Object.values(billByDay[dk]||{}).flat().forEach(t=>{ balance-=t.amount; });
    balanceMap[dk]=balance;
  });

  const finalBalance=balance;
  const isGreen=finalBalance>=0;

  // Chart: balance over time starting from monthlyIncome
  const chartPoints=[{x:0,y:monthlyIncome,date:null}];
  sortedDates.forEach((dk,i)=>chartPoints.push({x:i+1,y:balanceMap[dk],date:dk}));
  const chartMin=Math.min(...chartPoints.map(p=>p.y),0);
  const chartMax=Math.max(...chartPoints.map(p=>p.y),monthlyIncome);
  const chartRange=chartMax-chartMin||1;
  const CW=320,CH=80;
  const toX=(i)=>chartPoints.length<2?CW/2:(i/(chartPoints.length-1))*CW;
  const toY=(v)=>CH-((v-chartMin)/chartRange)*CH;
  const linePath=chartPoints.map((p,i)=>`${i===0?"M":"L"}${toX(i).toFixed(1)},${toY(p.y).toFixed(1)}`).join(" ");
  const areaPath=chartPoints.length>0
    ?`${linePath} L${toX(chartPoints.length-1).toFixed(1)},${CH} L0,${CH} Z`:"";

  return (
    <div style={{position:"fixed",inset:0,zIndex:600,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"52px 20px 14px",flexShrink:0}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}} onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2} strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        {/* Month selector */}
        <button onClick={()=>setShowMonthPicker(v=>!v)}
          style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",
            borderRadius:20,padding:"6px 14px",color:"#fff",fontSize:13,fontWeight:600,
            cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <svg width={13} height={13} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.6)" strokeWidth={2} strokeLinecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {mn[selectedMonth.month]} {selectedMonth.year}
          <svg width={10} height={10} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.4)" strokeWidth={2.5} strokeLinecap="round">
            <polyline points={showMonthPicker?"18 15 12 9 6 15":"6 9 12 15 18 9"}/>
          </svg>
        </button>
        <button style={{background:"linear-gradient(135deg,#5BB8F5,#2563EB)",border:"none",
          borderRadius:18,padding:"7px 12px",color:"#fff",fontSize:12,fontWeight:700,
          cursor:"pointer",display:"flex",alignItems:"center",gap:5}}
          onClick={onAddLancamento}>
          <svg width={12} height={12} viewBox="0 0 24 24" fill="none"
            stroke="currentColor" strokeWidth={2.5} strokeLinecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Novo
        </button>
      </div>
      {/* Month picker dropdown */}
      {showMonthPicker && (
        <div style={{position:"absolute",top:110,left:"50%",transform:"translateX(-50%)",
          zIndex:20,background:"#2A2A2E",border:"1px solid rgba(255,255,255,0.12)",
          borderRadius:16,padding:8,boxShadow:"0 8px 30px rgba(0,0,0,0.6)",
          width:260,maxHeight:280,overflowY:"auto"}}>
          {Array.from({length:12},(_,i)=>{
            const d = new Date(); d.setMonth(d.getMonth()-i);
            const m = d.getMonth(); const y = d.getFullYear();
            const active = selectedMonth.month===m && selectedMonth.year===y;
            return (
              <div key={i} onClick={()=>{setSelectedMonth({month:m,year:y});setShowMonthPicker(false);}}
                style={{padding:"10px 14px",borderRadius:10,cursor:"pointer",
                  display:"flex",justifyContent:"space-between",alignItems:"center",
                  background:active?"rgba(59,130,246,0.15)":"transparent",
                  marginBottom:2}}>
                <span style={{fontSize:14,fontWeight:active?700:400,
                  color:active?"#60A5FA":"#FFFFFF"}}>{mn[m]} {y}</span>
                {active && <svg width={14} height={14} viewBox="0 0 24 24" fill="none"
                  stroke="#3B82F6" strokeWidth={2.5} strokeLinecap="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>}
              </div>
            );
          })}
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",padding:"0 18px 30px"}}>

        {/* ── Summary ── */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:4}}>Visão Geral do Mês</div>
          {/* Big balance */}
          <div style={{fontSize:30,fontWeight:800,
            color:isGreen?"#4ADE80":"#F87171",letterSpacing:-0.5,marginBottom:6}}>
            {fmtM(finalBalance,false)}
          </div>
          {/* Status line */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
            {isGreen ? (
              <>
                <div style={{width:16,height:16,borderRadius:"50%",background:"#22C55E",
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width={9} height={9} viewBox="0 0 24 24" fill="none"
                    stroke="#fff" strokeWidth={3} strokeLinecap="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                </div>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.45)"}}>
                  Tudo certo, previsão de fechar no verde
                </span>
              </>
            ) : (
              <>
                <span style={{fontSize:15}}>⚠️</span>
                <span style={{fontSize:12,fontWeight:700,color:"#F87171"}}>
                  Vai fechar no vermelho — excede {fmtM(Math.abs(finalBalance))}
                </span>
              </>
            )}
          </div>

          {/* Chart */}
          {chartPoints.length>1 && (
            <div style={{background:"#13181F",borderRadius:14,padding:"12px 14px 8px",
              border:"1px solid rgba(255,255,255,0.06)",marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Saldo acumulado</span>
                <span style={{fontSize:11,color:isGreen?"#4ADE80":"#F87171",fontWeight:700}}>
                  {fmtM(finalBalance,false)}
                </span>
              </div>
              <svg width="100%" viewBox={`0 0 ${CW} ${CH+4}`} style={{display:"block"}}>
                <defs>
                  <linearGradient id="ca" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={isGreen?"#4ADE80":"#F87171"} stopOpacity="0.2"/>
                    <stop offset="100%" stopColor={isGreen?"#4ADE80":"#F87171"} stopOpacity="0.02"/>
                  </linearGradient>
                </defs>
                {/* Zero line */}
                {chartMin<0 && (
                  <line x1="0" y1={toY(0).toFixed(1)} x2={CW} y2={toY(0).toFixed(1)}
                    stroke="rgba(255,255,255,0.08)" strokeWidth="1" strokeDasharray="3 3"/>
                )}
                <path d={areaPath} fill="url(#ca)"/>
                <path d={linePath} fill="none" stroke={isGreen?"#4ADE80":"#F87171"}
                  strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                {chartPoints.map((p,i)=>(
                  <circle key={i} cx={toX(i)} cy={toY(p.y)} r="2.5"
                    fill={isGreen?"#4ADE80":"#F87171"} stroke="#111" strokeWidth="1.5"/>
                ))}
              </svg>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>
                  Início: {fmtM(monthlyIncome)}
                </span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>
                  Fim: 27 {mn[today.getMonth()].slice(0,3)}
                </span>
              </div>
            </div>
          )}
        </div>

        {/* Section header with filter button */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:15,fontWeight:700,color:"#FFFFFF"}}>Lançamentos</span>
            {/* Filter button */}
            <button onClick={()=>setShowFilters(v=>!v)}
              style={{background:showFilters||filterPayment||filterBudget
                ?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.07)",
                border:showFilters||filterPayment||filterBudget
                  ?"1px solid rgba(59,130,246,0.4)":"1px solid rgba(255,255,255,0.1)",
                borderRadius:14,padding:"4px 10px",cursor:"pointer",
                display:"flex",alignItems:"center",gap:5}}>
              <svg width={12} height={12} viewBox="0 0 24 24" fill="none"
                stroke={filterPayment||filterBudget?"#60A5FA":"rgba(255,255,255,0.5)"}
                strokeWidth={2} strokeLinecap="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
              </svg>
              <span style={{fontSize:11,fontWeight:600,
                color:filterPayment||filterBudget?"#60A5FA":"rgba(255,255,255,0.5)"}}>

            borderRadius:14,padding:14,marginBottom:12}}>

              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Pagamento</div>

                    {p===null?"Todos":p==="debito"?"Débito":p==="credito"?"Crédito":"Dinheiro"}
                  </button>
                ))}
              </div>
            </div>
            {/* Budget filter */}
            <div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Budget</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

                  style={{padding:"5px 12px",borderRadius:12,border:"none",cursor:"pointer",
                    fontSize:12,fontWeight:600,
                    background:filterBudget===null?"linear-gradient(135deg,#5BB8F5,#2563EB)":"rgba(255,255,255,0.07)",
                    color:filterBudget===null?"#fff":"rgba(255,255,255,0.6)"}}>

                      fontSize:12,fontWeight:600,
                      background:filterBudget===b.id?b.color:"rgba(255,255,255,0.07)",

                    {b.name}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Empty */}
        {sortedDates.length===0 && (
          <div style={{textAlign:"center",padding:"50px 0"}}>
            <div style={{fontSize:36,marginBottom:10}}>📭</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.3)",marginBottom:16}}>Nenhum lançamento ainda</div>
            <button style={{background:"linear-gradient(135deg,#5BB8F5,#2563EB)",border:"none",
              borderRadius:20,padding:"10px 24px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}
              onClick={onAddLancamento}>Adicionar lançamento</button>
          </div>
        )}

        {/* Timeline — oldest→newest (top→bottom) */}
        {sortedDates.map(dateKey=>{
          const d         = new Date(dateKey+"T00:00:00");
          const dayTxs    = txsByDay[dateKey]||[];
          const dayEnt    = entByDay[dateKey]||[];
          const dayBill   = billByDay[dateKey]||{};
          const dayBalance= balanceMap[dateKey];
          // What changed this day
          const dayDebitAmt  = dayTxs.filter(t=>t.payment!=="credito").reduce((s,t)=>s+t.amount,0);
          const dayEntAmt    = dayEnt.reduce((s,t)=>s+t.amount,0);
          const dayBillAmt   = Object.values(dayBill).flat().reduce((s,t)=>s+t.amount,0);
          const dayChange    = dayEntAmt - dayDebitAmt - dayBillAmt;

          return (
            <div key={dateKey} style={{marginBottom:16}}>
              {/* Day header — date only */}
              <div style={{marginBottom:6,paddingBottom:4,
                borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <span style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.5)"}}>
                  {fmtDate(d)}
                </span>
              </div>

              {/* Entradas (green) */}
              {dayEnt.map(tx=>(
                <div key={tx.id} style={{display:"flex",alignItems:"center",gap:10,
                  padding:"8px 10px",marginBottom:4,
                  background:"rgba(74,222,128,0.06)",
                  borderRadius:11,
                  borderLeft:"3px solid #4ADE80"}}>
                  <div style={{width:34,height:34,borderRadius:9,flexShrink:0,
                    background:"rgba(74,222,128,0.15)",
                    border:"1px solid rgba(74,222,128,0.3)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
                    💰
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#FFFFFF",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {tx.description}
                    </div>
                    <div style={{fontSize:10,color:"rgba(74,222,128,0.7)",marginTop:2}}>
                      Entrada
                    </div>
                  </div>
                  <div style={{fontSize:13,fontWeight:800,color:"#4ADE80",flexShrink:0}}>
                    +{fmtM(tx.amount,false)}
                  </div>
                </div>
              ))}

              {/* Saídas (debit/cash + credit display) — apply filters */}
              {dayTxs.filter(tx=>{
                if(filterPayment && tx.payment!==filterPayment) return false;
                if(filterBudget && tx.budgetId!==filterBudget) return false;
                return true;
              }).map(tx=>{
                const bgt      = budgets.find(b=>b.id===tx.budgetId);
                const isCredit = tx.payment==="credito";
                const cardObj  = isCredit ? cards.find(c=>c.id===tx.cartao) : null;
                const cardColor= cardObj?.color||"#3B82F6";
                const isCounted= !isCredit; // credit NOT counted on purchase day

                return (
                  <div key={tx.id}
                    onTouchStart={()=>handleTxLongPress(tx)}
                    onTouchEnd={handleTxPressEnd}
                    onTouchMove={handleTxPressEnd}
                    onMouseDown={()=>handleTxLongPress(tx)}
                    onMouseUp={handleTxPressEnd}
                    style={{
                    display:"flex",alignItems:"center",gap:10,
                    padding:"8px 10px",marginBottom:4,
                    background:isCredit?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.04)",
                    borderRadius:11,
                    opacity:isCredit?0.75:1,
                    cursor:"pointer",
                  }}>
                    <div style={{width:34,height:34,borderRadius:9,flexShrink:0,
                      background:isCredit?`${cardColor}18`:(bgt?`${bgt.color}18`:"rgba(255,255,255,0.07)"),
                      border:`1px solid ${isCredit?cardColor+"30":(bgt?bgt.color+"25":"rgba(255,255,255,0.08)")}`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>
                      {isCredit?"💳":<BIcon type={bgt?.icon||"dollar"} size={16}/>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#FFFFFF",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {tx.description}
                      </div>
                      <div style={{display:"flex",gap:6,marginTop:2,alignItems:"center",flexWrap:"wrap"}}>
                        {isCredit && cardObj ? (
                          <span style={{fontSize:10,color:cardColor,
                            borderBottom:`1px solid ${cardColor}`,paddingBottom:1,lineHeight:1.2}}>
                            {cardObj.name}
                          </span>
                        ) : (
                          <span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>
                            {tx.payment==="debito"?"Débito":"Dinheiro"}
                          </span>
                        )}
                        {bgt && (
                          <span style={{fontSize:10,color:bgt.color}}>{bgt.name}</span>
                        )}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:13,fontWeight:700,
                        color:isCounted?"#F87171":"rgba(255,255,255,0.35)"}}>
                        {isCounted?"−":""}{fmtM(tx.amount,false)}
                      </div>
                      {isCredit && (
                        <div style={{fontSize:9,color:"rgba(255,255,255,0.2)",marginTop:1}}>
                          fatura {(()=>{const bd=new Date((tx.billingDate||tx.purchaseDate)+"T00:00:00");
                            return pad(bd.getDate())+"/"+pad(bd.getMonth()+1);})()}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}

              {/* Credit billing consolidated rows (day 27 etc) */}
              {Object.entries(dayBill).map(([cardId,txList])=>{
                const cardObj  = cards.find(c=>c.id===cardId);
                const cardColor= cardObj?.color||"#3B82F6";
                const cardName = cardObj?.name||cardId;
                const total    = txList.reduce((s,t)=>s+t.amount,0);
                return (
                  <div key={cardId} style={{
                    display:"flex",alignItems:"center",gap:10,
                    padding:"8px 10px",marginBottom:4,
                    background:`${cardColor}10`,
                    borderRadius:11,
                    borderLeft:`3px solid ${cardColor}`,
                  }}>
                    <div style={{width:34,height:34,borderRadius:9,flexShrink:0,
                      background:`${cardColor}20`,border:`1px solid ${cardColor}40`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
                      💳
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#FFFFFF"}}>{cardName}</div>
                      <div style={{fontSize:10,color:cardColor,marginTop:2}}>
                        {txList.length} compra{txList.length!==1?"s":""} · pagamento dia {pad(d.getDate())}/{pad(d.getMonth()+1)}
                      </div>
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"#F87171",flexShrink:0}}>
                      −{fmtM(total,false)}
                    </div>
                  </div>
                );
              })}

            </div>
          );
        })}
      </div>

      {/* ── EDIT TRANSACTION MODAL ── */}
      {editTx && editScope==='ask' && (
        <div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(0,0,0,0.7)",
          display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#1C1C1E",borderRadius:"20px 20px 0 0",
            padding:"24px 20px 40px",width:"100%",maxWidth:430}}>
            <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:8}}>
              Editar lançamento recorrente
            </div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:20}}>
              "{editTx.description}" é recorrente. O que deseja editar?
            </div>
            <button onClick={()=>setEditScope('one')}
              style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:"pointer",
                background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:15,fontWeight:600,marginBottom:10}}>
              Somente este lançamento
            </button>
            <button onClick={()=>setEditScope('forward')}
              style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:"pointer",
                background:"rgba(59,130,246,0.15)",color:"#60A5FA",fontSize:15,fontWeight:600,marginBottom:10}}>
              Este e os próximos
            </button>
            <button onClick={()=>{setEditTx(null);setEditScope(null);}}
              style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:"pointer",
                background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:15}}>
              Cancelar
            </button>
          </div>
        </div>
      )}
      {editTx && (editScope==='one'||editScope==='forward') && (
        <div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(0,0,0,0.8)",
          display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#1C1C1E",borderRadius:20,padding:24,
            width:"100%",maxWidth:400,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <span style={{fontSize:17,fontWeight:700,color:"#fff"}}>Editar Lançamento</span>
              <button onClick={()=>{setEditTx(null);setEditScope(null);}}
                style={{background:"none",border:"none",cursor:"pointer"}}>
                <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
                  stroke="rgba(255,255,255,0.5)" strokeWidth={2} strokeLinecap="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            {/* Description */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Descrição</div>
              <input value={editTx.description}
                onChange={e=>setEditTx(p=>({...p,description:e.target.value}))}
                style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:15,outline:"none"}}/>
            </div>
            {/* Amount */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Valor</div>
              <input type="number" value={editTx.amount}
                onChange={e=>setEditTx(p=>({...p,amount:parseFloat(e.target.value)||0}))}
                style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:15,outline:"none"}}/>
            </div>
            {/* Date */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Data</div>
              <input type="date" value={editTx.purchaseDate}
                onChange={e=>setEditTx(p=>({...p,purchaseDate:e.target.value}))}
                style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",
                  borderRadius:12,padding:"10px 14px",color:"#fff",fontSize:15,outline:"none"}}/>
            </div>
            {/* Actions */}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{
                  onEditTransaction && onEditTransaction(editTx, editScope);
                  setEditTx(null); setEditScope(null);
                }}
                style={{flex:1,padding:14,borderRadius:14,border:"none",cursor:"pointer",
                  background:"linear-gradient(135deg,#5BB8F5,#2563EB)",
                  color:"#fff",fontSize:15,fontWeight:700}}>
                Salvar
              </button>
              <button onClick={()=>{
                  onDeleteTransaction && onDeleteTransaction(editTx.id, editScope);
                  setEditTx(null); setEditScope(null);
                }}
                style={{padding:"14px 16px",borderRadius:14,border:"none",cursor:"pointer",
                  background:"rgba(248,113,113,0.15)",color:"#F87171",fontSize:15,fontWeight:700}}>
                🗑
              </button>
            </div>
          </div>
        </div>
      )}    </div>
  );
}

/* ─── ENTRADA SCREEN ─────────────────────────────────────────────────────── */
function EntradaScreen({budgets, onClose, onSave}) {
  const today = new Date();
  const pad = (n) => String(n).padStart(2,"0");
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  const [desc,       setDesc]       = useState("");
  const [amount,     setAmount]     = useState("");
  const [date,       setDate]       = useState(todayStr);
  const [category,   setCategory]   = useState("salario");
  const [budgetId,   setBudgetId]   = useState(null);
  const [recorrente, setRecorrente] = useState(false);
  const [startDate,  setStartDate]  = useState(todayStr);
  const [endDate,    setEndDate]    = useState("");
  const [catOpen,    setCatOpen]    = useState(false);
  const [budgetOpen, setBudgetOpen] = useState(false);

  const catLabels = {
    salario:"💼 Salário", freelance:"💻 Freelance",
    transferencia:"🔄 Transferência", dividendo:"📈 Dividendo", outro:"📦 Outro",
  };
  const amt = parseFloat(amount) || 0;
  const canSave = desc.trim() && amt > 0;

  function handleSave() {
    if (!canSave) return;
    onSave({ id:Date.now(), description:desc.trim(), amount:amt,
      type:"entrada", category, budgetId, date,
      recorrente, startDate:recorrente?startDate:date, endDate:recorrente?endDate:null });
  }

  const row = {
    background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.09)",
    borderRadius:14, padding:"15px 18px",
    display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10,
  };
  const rowLabel = { fontSize:16, fontWeight:500, color:"#FFFFFF" };
  const chevron = (
    <svg width={13} height={13} viewBox="0 0 24 24" fill="none"
      stroke="rgba(255,255,255,0.25)" strokeWidth={2.5} strokeLinecap="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  );

  return (
    <div style={{position:"fixed",inset:0,zIndex:700,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column"}}>

      {/* header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"52px 24px 28px"}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}} onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2} strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <span style={{fontSize:19,fontWeight:700,color:"#FFFFFF"}}>Nova Entrada</span>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}} onClick={handleSave}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
            stroke={canSave?"#4ADE80":"rgba(74,222,128,0.28)"} strokeWidth={2.5} strokeLinecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"0 20px"}}>

        {/* Descrição */}
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",
          borderRadius:14,marginBottom:10,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            <input placeholder="Descrição" value={desc} onChange={e=>setDesc(e.target.value)}
              style={{background:"transparent",border:"none",outline:"none",width:"100%",
                fontSize:16,fontWeight:500,color:"#FFFFFF",fontFamily:"inherit"}}/>
          </div>
          <div style={{padding:"10px 18px"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.25)"}}>Ex: Salário de Março</span>
          </div>
        </div>

        {/* Valor */}
        <div style={{...row,cursor:"default"}}>
          <span style={rowLabel}>Valor</span>
          <input type="number" inputMode="decimal" placeholder="AED 0,00"
            value={amount} onChange={e=>setAmount(e.target.value)}
            style={{background:"transparent",border:"none",outline:"none",
              fontSize:17,fontWeight:600,color:"#4ADE80",textAlign:"right",
              fontFamily:"inherit",width:160}}/>
        </div>

        {/* Data */}
        <div style={row}>
          <span style={rowLabel}>Data</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={{background:"transparent",border:"none",outline:"none",
                fontSize:15,color:"rgba(255,255,255,0.35)",fontFamily:"inherit",
                colorScheme:"dark",cursor:"pointer"}}/>
            {chevron}
          </div>
        </div>

        {/* Categoria */}
        <div style={{...row,cursor:"pointer"}} onClick={()=>setCatOpen(v=>!v)}>
          <span style={rowLabel}>Categoria</span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:"#4ADE80",fontWeight:600}}>{catLabels[category]}</span>
            {chevron}
          </div>
        </div>
        {catOpen && (
          <div style={{background:"#2A2A2E",border:"1px solid rgba(255,255,255,0.09)",
            borderRadius:13,marginTop:-6,marginBottom:10,overflow:"hidden"}}>
            {Object.entries(catLabels).map(([key,label],i,arr)=>(
              <div key={key} style={{padding:"13px 18px",display:"flex",justifyContent:"space-between",
                alignItems:"center",cursor:"pointer",fontSize:15,
                borderBottom:i<arr.length-1?"1px solid rgba(255,255,255,0.06)":"none",
                background:category===key?"rgba(74,222,128,0.08)":"transparent",
                color:category===key?"#4ADE80":"#FFFFFF",fontWeight:category===key?600:400}}
                onClick={()=>{setCategory(key);setCatOpen(false);}}>
                {label}
                {category===key && (
                  <svg width={16} height={16} viewBox="0 0 24 24" fill="none"
                    stroke="#4ADE80" strokeWidth={2.5} strokeLinecap="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                )}
              </div>
            ))}
          </div>
        )}

        {/* Recorrente toggle */}
        <div style={{...row,cursor:"default"}}>
          <span style={rowLabel}>Recorrente</span>
          <div style={{position:"relative",width:48,height:28,cursor:"pointer"}}
            onClick={()=>setRecorrente(v=>!v)}>
            <div style={{position:"absolute",inset:0,borderRadius:14,
              background:recorrente?"linear-gradient(135deg,#5BB8F5,#2563EB)":"rgba(255,255,255,0.12)",
              transition:"background 0.25s"}}/>
            <div style={{position:"absolute",top:3,

/* ─── LANÇAMENTO SCREEN ──────────────────────────────────────────────────── */
function LancamentoScreen({budgets, cards=[], onClose, onSave}) {
  const today = new Date();
  const pad = (n) => String(n).padStart(2,"0");
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  function getBillingDate(dateStr, cardId) {
    const d   = new Date(dateStr + "T00:00:00");
    const c   = cards.find(c=>c.id===cardId);
    const closing = c?.closing ?? 11;
    const payDay  = c?.payment ?? 27;
    if (d.getDate() <= closing) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(payDay)}`;
    } else {
      const next = new Date(d.getFullYear(), d.getMonth()+1, payDay);
      return `${next.getFullYear()}-${pad(next.getMonth()+1)}-${pad(payDay)}`;
    }
  }

  const [desc,         setDesc]         = useState("");
  const [amount,       setAmount]       = useState("");
  const [purchaseDate, setPurchaseDate] = useState(todayStr);
  const [payment,      setPayment]      = useState("debito");   // debito | credito | dinheiro
  const [cartao,       setCartao]       = useState(cards[0]?.id || "");
  const [budgetId,     setBudgetId]     = useState(budgets[0]?.id || null);
  const [parcelado,    setParcelado]    = useState(false);
  const [recorrente,   setRecorrente]   = useState(false);
  const [startDate,    setStartDate]    = useState(todayStr);
  const [endDate,      setEndDate]      = useState("");
  const [juros,        setJuros]        = useState("2");
  const [vezes,        setVezes]        = useState("12");
  const [budgetOpen,   setBudgetOpen]   = useState(false);
  const [payOpen,      setPayOpen]      = useState(false);

  const selectedBudget = budgets.find(b=>b.id===budgetId);
  const amt  = parseFloat(amount) || 0;
  const canSave = desc.trim() && amt > 0 && budgetId;

  const billingDate = payment==="credito" ? getBillingDate(purchaseDate, cartao) : null;
  const fmt2 = (dateStr) => {
    const d = new Date(dateStr+"T00:00:00");
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
  };

  const payLabels = { debito:"Débito", credito:"Crédito", dinheiro:"Dinheiro" };

  function handleSave() {
    if (!canSave) return;
    onSave({
      id: Date.now(),
      description: desc.trim(),
      amount: amt,
      payment,
      cartao: payment==="credito" ? cartao : null,
      budgetId,
      purchaseDate,
      billingDate: billingDate || purchaseDate,
      parcelado,
      juros: parcelado ? parseFloat(juros)||0 : 0,
      vezes: parcelado ? parseInt(vezes)||1  : 1,
      recorrente,
      startDate: recorrente ? startDate : purchaseDate,
      endDate:   recorrente ? endDate   : null,
    });
  }

  /* shared styles */
  const row = {
    background:"rgba(255,255,255,0.05)",
    border:"1px solid rgba(255,255,255,0.09)",
    borderRadius:14, padding:"15px 18px",
    display:"flex", justifyContent:"space-between", alignItems:"center",
    marginBottom:10, cursor:"pointer",
  };
  const rowLabel = { fontSize:16, fontWeight:500, color:"#FFFFFF" };
  const rowValue = { fontSize:16, fontWeight:500, color:"rgba(255,255,255,0.35)", display:"flex", alignItems:"center", gap:6 };
  const chevron  = (
    <svg width={13} height={13} viewBox="0 0 24 24" fill="none"
      stroke="rgba(255,255,255,0.25)" strokeWidth={2.5} strokeLinecap="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  );

  return (
    <div style={{position:"fixed",inset:0,zIndex:600,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430, margin:"0 auto", display:"flex", flexDirection:"column"}}>

      {/* ── HEADER — X  title  ✓  (image 2 style) ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"52px 24px 28px"}}>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2} strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <span style={{fontSize:19,fontWeight:700,color:"#FFFFFF",letterSpacing:-0.2}}>
          Novo Lançamento
        </span>
        <button style={{background:"none",border:"none",cursor:"pointer",padding:4}}
          onClick={handleSave}>
          <svg width={22} height={22} viewBox="0 0 24 24" fill="none"
            stroke={canSave?"#3B82F6":"rgba(59,130,246,0.28)"} strokeWidth={2.5} strokeLinecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>

      <div style={{flex:1, overflowY:"auto", padding:"0 20px"}}>

        {/* ── Descrição block (2 lines, image 2) ── */}
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",
          borderRadius:14, padding:"0", marginBottom:10, overflow:"hidden"}}>
          <div style={{padding:"14px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            <input placeholder="Descrição" value={desc} onChange={e=>setDesc(e.target.value)}
              style={{background:"transparent",border:"none",outline:"none",width:"100%",
                fontSize:16,fontWeight:500,color:"#FFFFFF",fontFamily:"inherit",
                "::placeholder":{color:"rgba(255,255,255,0.25)"}}}/>
          </div>
          <div style={{padding:"10px 18px"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.25)"}}>Ex: Mercado Carrefour</span>
          </div>
        </div>

        {/* ── Valor ── */}
        <div style={{...row, cursor:"default"}}>
          <span style={rowLabel}>Valor</span>
          <input type="number" inputMode="decimal" placeholder="AED 0,00"
            value={amount} onChange={e=>setAmount(e.target.value)}
            style={{background:"transparent",border:"none",outline:"none",
              fontSize:17,fontWeight:600,color:"#3B82F6",textAlign:"right",
              fontFamily:"inherit",width:160}}/>
        </div>

        {/* ── Data da compra ── */}
        <div style={row}>
          <span style={rowLabel}>Data da compra</span>

            <input type="date" value={purchaseDate}
              onChange={e=>setPurchaseDate(e.target.value)}

        {/* ── Pagamento ── */}
        <div style={row} onClick={()=>setPayOpen(v=>!v)}>

        {payOpen && (

        {/* ── Fatura info (crédito) ── */}
        {payment==="credito" && (

                color:cartao===c.id?"#FFFFFF":"rgba(255,255,255,0.35)",transition:"all 0.2s",

          <div style={{position:"relative",width:48,height:28,cursor:"pointer"}}

                    textAlign:"right",fontFamily:"inherit",width:50}}/>
                <span style={{fontSize:16,color:"rgba(255,255,255,0.35)"}}>%</span>

              alignItems:"center"}}>
              <span style={rowLabel}>Vezes</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>

              fontWeight:selectedBudget?600:400}}>

        </div>

            borderRadius:13,marginTop:-6,marginBottom:10,overflow:"hidden"}}>
            {budgets.map((b,i)=>(
              <div key={b.id} style={{padding:"13px 18px",display:"flex",alignItems:"center",
                gap:10,cursor:"pointer",fontSize:14,color:"#FFFFFF",fontWeight:500,

                  display:"inline-block",flexShrink:0,boxShadow:`0 0 5px ${b.color}`}}/>
                <span style={{flex:1}}>{b.name}</span>
                <span style={{fontSize:12,color:"rgba(255,255,255,0.28)"}}>

                </span>

        {/* ── Recorrente toggle ── */}
        <div style={{...row,cursor:"default"}}>
          <span style={rowLabel}>Recorrente</span>
          <div style={{position:"relative",width:48,height:28,cursor:"pointer"}}

              transition:"background 0.25s"}}/>
            <div style={{position:"absolute",top:3,
              left:recorrente?22:3,width:22,height:22,borderRadius:"50%",

          <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:14,overflow:"hidden",marginBottom:10}}>
            <div style={{padding:"14px 18px",display:"flex",justifyContent:"space-between",
              alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
              <span style={rowLabel}>Início</span>
              <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
                style={{background:"transparent",border:"none",outline:"none",

                  colorScheme:"dark",cursor:"pointer"}}/>
            </div>
            <div style={{padding:"14px 18px",display:"flex",justifyContent:"space-between",

              <span style={rowLabel}>Fim</span>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}
                  style={{background:"transparent",border:"none",outline:"none",

                    fontFamily:"inherit",colorScheme:"dark",cursor:"pointer"}}/>
                {!endDate && <span style={{fontSize:12,color:"rgba(255,255,255,0.2)"}}>opcional</span>}
              </div>
            </div>

      {/* ── CTA ── */}
      <div style={{padding:"14px 20px 44px"}}>
        <button style={{width:"100%",padding:"17px 0",borderRadius:16,border:"none",
          background:canSave

            :"rgba(59,130,246,0.18)",
          color:canSave?"#FFFFFF":"rgba(255,255,255,0.22)",

          Adicionar lançamento
        </button>
      </div>
    </div>
  );
}

/* ─── BUDGET DETAIL SCREEN ───────────────────────────────────────────────── */
function BudgetDetail({b, hidden, onClose, transactions, cards}) {
  const avail   = b.limit - b.spent;
  const usedPct = Math.min((b.spent / b.limit)*100, 100);
  const availPct= Math.max(100 - usedPct, 0);
  const over    = avail < 0;
  const wkLeft  = getWeekendDaysLeft();
  const dLeft   = getDaysLeft();
  const period  = getPeriodLabel();
  const dailyBudget = dLeft > 0 ? avail / dLeft : 0;


  return (
    <div style={{position:"fixed", inset:0, zIndex:500,
      background:"linear-gradient(160deg,#161618 0%,#111111 40%,#0E0E10 100%)",
      fontFamily:"'SF Pro Display','Segoe UI',system-ui,sans-serif",
      maxWidth:430, margin:"0 auto", overflowY:"auto", overflowX:"hidden"}}>

      {/* ── HEADER ── */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"52px 22px 16px", position:"sticky", top:0, zIndex:10,
        background:"linear-gradient(160deg,#161618,#111111)"}}>
        <button style={{background:"none",border:"none",cursor:"pointer",
          display:"flex",alignItems:"center",gap:6,padding:0}} onClick={onClose}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none"
            stroke="rgba(255,255,255,0.55)" strokeWidth={2.2} strokeLinecap="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
